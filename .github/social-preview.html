<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>owloop social preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1280px;
      height: 640px;
      background:
        radial-gradient(ellipse 70vw 55vh at 15% -10%, rgba(212, 160, 37, 0.08), transparent 50%),
        radial-gradient(ellipse 60vw 60vh at 85% 20%, rgba(126, 199, 230, 0.05), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(212, 160, 37, 0.05) 0%, transparent 45%),
        linear-gradient(180deg, #080c1d 0%, #0d132b 60%, #0a0e22 100%);
      color: #f4f1e8;
      font-family: "Inter", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 8% 12%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1.5px 1.5px at 22% 28%, rgba(255,255,255,0.7), transparent),
        radial-gradient(2.2px 2.2px at 42% 8%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.6px 1.6px at 58% 35%, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 78% 18%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1.4px 1.4px at 92% 52%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1.8px 1.8px at 12% 62%, rgba(255,255,255,0.75), transparent),
        radial-gradient(2.1px 2.1px at 55% 72%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 88% 82%, rgba(255,255,255,0.65), transparent),
        radial-gradient(1.8px 1.8px at 35% 88%, rgba(255,255,255,0.6), transparent);
      background-size: 100% 100%;
      opacity: 0.75;
      pointer-events: none;
    }

    .moon {
      position: absolute;
      top: 48px;
      right: 72px;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f4e8c0 0%, #d4a025 60%, #b5851b 100%);
      box-shadow: 0 0 60px rgba(212, 160, 37, 0.35);
      opacity: 0.95;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .owl-wrap {
      width: 220px;
      height: 220px;
      margin-bottom: 6px;
      filter: drop-shadow(0 24px 48px rgba(0, 0, 0, 0.5));
    }

    .owl-wrap svg { width: 100%; height: 100%; }

    .brand {
      font-family: "Cinzel Decorative", Georgia, "Times New Roman", serif;
      font-size: 92px;
      font-weight: 700;
      color: #d4a025;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .tagline {
      font-family: "Caveat", "Brush Script MT", cursive;
      font-size: 42px;
      font-weight: 600;
      color: #f4f1e8;
      opacity: 0.92;
      line-height: 1.2;
      margin-bottom: 34px;
    }

    .subtitle {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b8bdd4;
    }

    .float-cards {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .float-card {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.1rem;
      background: rgba(13, 19, 43, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.8rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      font-size: 0.9rem;
      color: #f4f1e8;
      font-weight: 500;
    }

    .float-card svg { width: 18px; height: 18px; flex-shrink: 0; }
    .float-card.success { color: #7dd87a; border-color: rgba(125, 216, 122, 0.3); }
    .float-card.amber { color: #f0c563; border-color: rgba(212, 160, 37, 0.3); }
    .float-card.cyan { color: #7ec7e6; border-color: rgba(126, 199, 230, 0.3); }

    .float-card-1 { top: 90px; left: 92px; }
    .float-card-2 { bottom: 120px; left: 78px; }
    .float-card-3 { bottom: 86px; right: 96px; }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>

  <div class="float-cards" aria-hidden="true">
    <div class="float-card success float-card-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>3 specs verified</span>
    </div>
    <div class="float-card amber float-card-2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Runs overnight</span>
    </div>
    <div class="float-card cyan float-card-3">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
      <span>Worktree isolated</span>
    </div>
  </div>

  <div class="content">
    <div class="owl-wrap">
      <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <!-- Moon glow behind owl -->
        <circle cx="200" cy="210" r="150" fill="rgba(212, 160, 37, 0.08)"/>
        <circle cx="200" cy="210" r="115" fill="rgba(212, 160, 37, 0.05)"/>

        <!-- Branch -->
        <line x1="60" y1="315" x2="340" y2="315" stroke="#6b5a3e" stroke-width="10" stroke-linecap="round"/>

        <!-- Body -->
        <ellipse cx="200" cy="245" rx="70" ry="82" fill="#d4a025"/>

        <!-- Wing suggestion -->
        <path d="M145 225 Q132 255 148 280" stroke="#b5851b" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M255 225 Q268 255 252 280" stroke="#b5851b" stroke-width="5" fill="none" stroke-linecap="round"/>

        <!-- Feet -->
        <ellipse cx="175" cy="318" rx="11" ry="5" fill="#b5851b"/>
        <ellipse cx="225" cy="318" rx="11" ry="5" fill="#b5851b"/>

        <!-- Head -->
        <circle cx="200" cy="170" r="60" fill="#d4a025"/>

        <!-- Ear tufts -->
        <path d="M150 130 L145 100 L162 122 Z" fill="#d4a025"/>
        <path d="M250 130 L255 100 L238 122 Z" fill="#d4a025"/>

        <!-- Face disc -->
        <ellipse cx="200" cy="178" rx="42" ry="34" fill="#f0c563" opacity="0.35"/>

        <!-- Subtle round glasses (Harry Potter reference) -->
        <circle cx="177" cy="168" r="22" fill="none" stroke="#1a1e33" stroke-width="2"/>
        <circle cx="223" cy="168" r="22" fill="none" stroke="#1a1e33" stroke-width="2"/>
        <line x1="199" y1="168" x2="201" y2="168" stroke="#1a1e33" stroke-width="2"/>

        <!-- Eyes -->
        <circle cx="177" cy="168" r="18" fill="#f4f1e8"/>
        <circle cx="223" cy="168" r="18" fill="#f4f1e8"/>
        <circle cx="180" cy="168" r="7" fill="#080c1d"/>
        <circle cx="226" cy="168" r="7" fill="#080c1d"/>
        <circle cx="182" cy="164" r="2.5" fill="#ffffff" opacity="0.95"/>
        <circle cx="228" cy="164" r="2.5" fill="#ffffff" opacity="0.95"/>

        <!-- Beak -->
        <path d="M193 185 L200 198 L207 185 Z" fill="#b5851b"/>
      </svg>
    </div>
    <h1 class="brand">Owloop</h1>
    <p class="tagline">Your code evolves while you sleep.</p>
    <p class="subtitle">Spec-driven autonomous coding loop</p>
  </div>
</body>
</html>
