<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>owloop social preview</title>
<style>
  :root {
    --amber: #d4a025;
    --amber-soft: #f0c563;
    --amber-deep: #b5851b;
    --night: #0b1026;
    --night-2: #0e1330;
    --night-3: #121a3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    background: var(--night);
    font-family: -apple-system, "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }

  .canvas {
    position: relative;
    width: 1280px;
    height: 640px;
    background:
      radial-gradient(ellipse 1200px 520px at 50% 5%, rgba(212,160,37,0.08), transparent 55%),
      radial-gradient(ellipse 1600px 900px at 50% 110%, #141d42 0%, var(--night-2) 45%, var(--night) 70%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Faint infinity loop watermark */
  .loop-mark {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 480px;
    height: 220px;
    transform: translate(-50%, -50%);
    opacity: 0.10;
    pointer-events: none;
  }
  .loop-mark::before,
  .loop-mark::after {
    content: "";
    position: absolute;
    width: 220px;
    height: 220px;
    border: 10px solid var(--amber-soft);
    border-radius: 50%;
  }
  .loop-mark::before {
    left: 0;
    border-right-color: transparent;
    transform: rotate(-15deg);
  }
  .loop-mark::after {
    right: 0;
    border-left-color: transparent;
    transform: rotate(15deg);
  }

  /* stars */
  .stars, .stars::before, .stars::after {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .stars {
    background-image:
      radial-gradient(1.6px 1.6px at 62px 84px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 152px 220px, #fff, transparent),
      radial-gradient(1.8px 1.8px at 240px 60px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 340px 300px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 430px 130px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 520px 260px, #fff, transparent),
      radial-gradient(1.8px 1.8px at 90px 400px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 200px 500px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 980px 90px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 1080px 200px, #fff, transparent),
      radial-gradient(1.8px 1.8px at 1160px 70px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 1200px 320px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 1030px 460px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 1130px 540px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 760px 50px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 850px 150px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 40px 560px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 120px 40px, #fff, transparent);
    opacity: 0.65;
  }
  .stars::before {
    content: "";
    background-image:
      radial-gradient(1.4px 1.4px at 280px 120px, #fff, transparent),
      radial-gradient(1.2px 1.2px at 560px 80px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 720px 340px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 940px 260px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 1120px 420px, #fff, transparent),
      radial-gradient(1.2px 1.2px at 1240px 180px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 50px 300px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 180px 600px, #fff, transparent);
    opacity: 0.55;
  }
  .stars::after {
    content: "";
    background-image:
      radial-gradient(1.3px 1.3px at 420px 180px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 600px 420px, #fff, transparent),
      radial-gradient(1.2px 1.2px at 820px 80px, #fff, transparent),
      radial-gradient(1.4px 1.4px at 1000px 360px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 1180px 500px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 160px 160px, #fff, transparent),
      radial-gradient(1.2px 1.2px at 300px 520px, #fff, transparent);
    opacity: 0.45;
  }

  /* subtle twinkle */
  .twinkle {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-image:
      radial-gradient(2px 2px at 240px 60px, #fff, transparent),
      radial-gradient(2px 2px at 980px 90px, #fff, transparent),
      radial-gradient(2px 2px at 520px 260px, #fff, transparent),
      radial-gradient(2px 2px at 1160px 70px, #fff, transparent),
      radial-gradient(2px 2px at 850px 150px, #fff, transparent),
      radial-gradient(2px 2px at 430px 130px, #fff, transparent);
    animation: twinkle 3s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes twinkle {
    0% { opacity: 0.25; }
    100% { opacity: 0.85; }
  }

  /* crescent moon accent, upper right */
  .moon {
    position: absolute;
    top: 72px;
    right: 128px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--amber-soft);
    box-shadow: -18px 4px 0 2px var(--night-2);
    opacity: 0.85;
    filter: blur(0.2px);
  }

  .content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    transform: translateY(-10px);
    z-index: 2;
  }

  /* ---- CSS owl ---- */
  .owl {
    width: 138px;
    height: 124px;
    position: relative;
    margin-bottom: 8px;
  }
  .owl .ear {
    position: absolute;
    top: -12px;
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-bottom: 34px solid var(--amber);
  }
  .owl .ear.left { left: 8px; transform: rotate(-16deg); }
  .owl .ear.right { right: 8px; transform: rotate(16deg); }

  .owl .body {
    position: absolute;
    top: 6px;
    left: 0;
    width: 138px;
    height: 118px;
    background:
      radial-gradient(ellipse 70% 70% at 35% 35%, var(--amber-soft), transparent 50%),
      radial-gradient(ellipse 120% 100% at 50% 100%, var(--amber-deep), var(--amber));
    border-radius: 52% 52% 48% 48% / 58% 58% 42% 42%;
    box-shadow:
      inset 0 -10px 18px rgba(0,0,0,0.18),
      inset 0 6px 14px rgba(255,255,255,0.12);
  }

  .owl .feathers {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 34px;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .owl .feathers::before,
  .owl .feathers::after {
    content: "";
    width: 22px;
    height: 34px;
    background: var(--amber-deep);
    border-radius: 50% 50% 45% 45%;
    opacity: 0.55;
  }

  .owl .face {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    width: 112px;
    height: 76px;
    background: var(--night);
    border-radius: 50%;
  }

  .owl .eye {
    position: absolute;
    top: 18px;
    width: 36px;
    height: 36px;
    background: radial-gradient(circle at 40% 35%, #fff7d6, var(--amber-soft) 55%, var(--amber) 95%);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }
  .owl .eye.left { left: 10px; }
  .owl .eye.right { right: 10px; }
  .owl .eye::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    background: var(--night);
    border-radius: 50%;
    transform: translate(-40%, -40%);
    box-shadow: inset 1px 1px 2px rgba(255,255,255,0.25);
  }

  .owl .beak {
    position: absolute;
    top: 48px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 18px solid var(--amber);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
  }

  h1.brand {
    font-size: 78px;
    font-weight: 700;
    letter-spacing: -1.5px;
    color: var(--amber);
    line-height: 1;
    text-shadow: 0 2px 18px rgba(212,160,37,0.18);
  }

  p.tagline {
    font-size: 26px;
    font-weight: 400;
    color: #f4f6fd;
    opacity: 0.93;
    letter-spacing: 0.3px;
  }

  p.footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 15px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.72;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="loop-mark"></div>
    <div class="stars"></div>
    <div class="twinkle"></div>
    <div class="moon"></div>
    <div class="content">
      <div class="owl">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="body"></div>
        <div class="feathers"></div>
        <div class="face"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="beak"></div>
      </div>
      <h1 class="brand">owloop</h1>
      <p class="tagline">Your code evolves while you sleep.</p>
    </div>
    <p class="footer">Spec-driven autonomous coding loop</p>
  </div>
</body>
</html>
